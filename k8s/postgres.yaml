---
apiVersion: v1
kind: Namespace
metadata:
  name: cofrap
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: cofrap
type: Opaque
stringData:
  POSTGRES_DB: cofrap
  POSTGRES_USER: cofrap
  POSTGRES_PASSWORD: cofrap_secure_password_2024
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: cofrap
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS users (
      id        SERIAL PRIMARY KEY,
      username  VARCHAR(255) UNIQUE NOT NULL,
      password  TEXT,
      mfa       TEXT,
      gendate   BIGINT,
      expired   INTEGER DEFAULT 0
    );
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: cofrap
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: cofrap
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: init-script
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
