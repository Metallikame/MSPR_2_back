name: CI — Build & Push Backend Functions

on:
  push:
    branches: [master]
    paths:
      - "functions/**"
      - "k8s/**"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/metallikame/mspr_2_back

jobs:
  build-and-push:
    name: Build ${{ matrix.function }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      matrix:
        function: [generate-password, generate-2fa, authenticate]

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.function }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: functions/${{ matrix.function }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  update-manifests:
    name: Update image tags in k8s manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          for fn in generate-password generate-2fa authenticate; do
            sed -i "s|image: ghcr.io/metallikame/mspr_2_back/${fn}:.*|image: ghcr.io/metallikame/mspr_2_back/${fn}:${SHORT_SHA}|g" \
              k8s/deployment.yaml
          done

      - name: Commit updated manifests
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git diff --staged --quiet || \
            git commit -m "ci: update function images to $(echo ${{ github.sha }} | cut -c1-7) [skip ci]"
          git push
